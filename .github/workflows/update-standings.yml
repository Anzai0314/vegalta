name: Update J.League standings

on:
  schedule:
    # UTC 05:00-15:00 = 日本時間 14:00-24:00 の間、30分おきに実行（試合が行われやすい時間帯を想定）
    - cron: "*/30 5-15 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-standings:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Fetch standings
        run: python scripts/fetch_standings.py

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/standings.json
          git diff --cached --quiet || git commit -m "chore: update J.League standings [skip ci]"
          git push
