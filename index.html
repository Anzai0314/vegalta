<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#131310">
<title>VEGALTA 仙台 - Player &amp; Formation Tracker</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{
    --night:#131310; --panel:#1c1c16; --border:#26261e; --border2:#2a2a22;
    --gold:#F4B400; --gold-deep:#B8860B; --cream:#F3EFE3; --muted:#9C9686; --dim:#5a5648;
    --gk:#5AA9E6; --df:#6FCF97; --mf:#F2C94C; --fw:#EB5757;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--night);color:var(--cream);
    font-family:-apple-system,'Hiragino Sans','Yu Gothic',system-ui,sans-serif;}
  body{padding:20px 16px 60px;}
  .wrap{max-width:920px;margin:0 auto;}
  header{display:flex;align-items:center;gap:10px;margin-bottom:22px;flex-wrap:wrap;}
  header .btn-ghost{padding:7px 10px;font-size:12px;white-space:nowrap;}
  .logo{width:44px;height:44px;border-radius:10px;background:linear-gradient(160deg,#1c1c16,#131310);
    border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .brand{font-weight:900;font-size:19px;letter-spacing:1px;}
  .brand span{color:var(--gold);}
  .sub{font-size:11px;color:var(--dim);letter-spacing:1px;}
  nav{display:flex;gap:6px;margin-bottom:22px;border-bottom:1px solid #24241c;padding-bottom:0;flex-wrap:wrap;}
  nav button{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;
    padding:9px 14px;font-size:13px;font-weight:700;color:var(--dim);border-bottom:2px solid transparent;
    margin-bottom:-1px;font-family:inherit;}
  nav button.active{color:var(--gold);border-bottom:2px solid var(--gold);}
  h2.section{font-size:17px;font-weight:700;margin:0;color:var(--cream);}
  .section-sub{font-size:11px;color:var(--dim);margin-top:1px;}
  .row-between{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
  .btn-gold{background:linear-gradient(180deg,#F7C233,#D89A00);border:none;border-radius:8px;padding:9px 15px;
    color:#131310;font-weight:700;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-family:inherit;}
  .btn-ghost{background:transparent;border:1px solid var(--border2);border-radius:8px;padding:8px 13px;
    color:var(--muted);font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-family:inherit;}
  .btn-danger{color:var(--fw);}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;cursor:pointer;}
  .card.static{cursor:default;}
  .grid-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px;}
  .pos-group{margin-bottom:22px;}
  .pos-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .dot{width:8px;height:8px;border-radius:50%;}
  .mono{font-family:ui-monospace,'SFMono-Regular',Menlo,monospace;}
  .label-mono{font-size:12px;letter-spacing:2px;color:var(--muted);font-family:ui-monospace,monospace;}
  .avatar{border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#0e0e0b;}
  .avatar img{width:100%;height:100%;object-fit:cover;}
  .tag{font-size:11px;font-weight:700;letter-spacing:1px;color:#131310;border-radius:4px;padding:2px 7px;font-family:ui-monospace,monospace;}
  .empty{border:1.5px dashed var(--border2);border-radius:12px;padding:40px 20px;text-align:center;color:var(--dim);font-size:13px;line-height:1.7;}
  .stat-chip{flex:1;text-align:center;}
  .stat-chip .v{font-weight:700;font-size:16px;color:var(--cream);}
  .stat-chip .l{font-size:10px;color:var(--muted);margin-top:1px;}
  input,select,textarea{background:var(--night);border:1px solid var(--border2);border-radius:8px;padding:9px 11px;
    color:var(--cream);font-size:14px;outline:none;width:100%;font-family:inherit;}
  input:focus,select:focus,textarea:focus{border-color:var(--gold);}
  label.field{display:flex;flex-direction:column;gap:5px;font-size:12px;color:var(--muted);}
  .overlay{position:fixed;inset:0;background:rgba(6,6,4,0.72);display:flex;align-items:center;justify-content:center;
    z-index:50;padding:16px;}
  .panel{background:var(--panel);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:440px;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);max-height:88vh;display:flex;flex-direction:column;}
  .panel-head{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-bottom:1px solid var(--border2);}
  .panel-head h3{font-size:15px;font-weight:700;margin:0;}
  .panel-body{padding:16px 20px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;}
  .panel-foot{display:flex;justify-content:space-between;padding:14px 20px;border-top:1px solid var(--border2);}
  .icon-btn{background:none;border:none;cursor:pointer;padding:4px;color:var(--muted);font-size:18px;line-height:1;}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .three-col{display:flex;gap:10px;}
  .three-col > *{flex:1;}
  .formation-pick{display:flex;gap:8px;flex-wrap:wrap;}
  .formation-pick button{background:transparent;border:1px solid var(--border2);border-radius:8px;padding:8px 13px;
    color:var(--muted);font-size:13px;cursor:pointer;font-family:inherit;}
  .formation-pick button.active{border-color:var(--gold);color:var(--gold);}
  .pitch-wrap{max-width:340px;margin:0 auto;}
  .stat-row{display:flex;align-items:center;gap:8px;background:#17170f;border-radius:8px;padding:7px 10px;margin-bottom:6px;}
  .stat-row .name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .stat-inputs{display:flex;gap:6px;flex-shrink:0;}
  .stat-inputs input{width:46px;padding:6px 2px;text-align:center;}
  .stat-inputs input.minutes{width:54px;}
  .stat-col-head{display:flex;gap:6px;flex-shrink:0;font-size:9px;color:var(--dim);text-align:center;}
  .stat-col-head span{width:46px;}
  .stat-col-head span.minutes{width:54px;}
  .list-item{background:transparent;border:none;border-radius:8px;padding:10px 12px;text-align:left;color:var(--cream);
    font-size:13px;cursor:pointer;display:flex;align-items:center;width:100%;font-family:inherit;}
  .list-item:hover{background:#232319;}
  .bar-track{height:4px;background:#26261e;border-radius:2px;margin-top:4px;}
  .bar-fill{height:100%;border-radius:2px;}
  .total-stat{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;}
  .total-stat .v{font-size:26px;font-weight:700;color:var(--gold);}
  .total-stat .l{font-size:11px;color:var(--muted);margin-top:2px;}
  .leaders-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;}
  .totals-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0 22px;}
  svg{display:block;}
  .ha-toggle{display:flex;gap:6px;margin-top:5px;}
  .ha-btn{flex:1;text-align:center;padding:9px 6px;border-radius:8px;border:1px solid var(--border2);
    background:transparent;color:var(--muted);font-weight:800;font-size:13px;letter-spacing:1px;cursor:pointer;font-family:inherit;}
  .ha-btn.active.home{background:linear-gradient(180deg,#F7C233,#D89A00);color:#131310;border-color:transparent;}
  .ha-btn.active.away{background:#3a3a2e;color:#F3EFE3;border-color:#4a4a3d;}
  .ha-badge{display:inline-flex;align-items:center;gap:4px;font-weight:900;letter-spacing:1.5px;font-size:12px;
    padding:4px 10px;border-radius:6px;flex-shrink:0;}
  .ha-badge.home{background:linear-gradient(180deg,#F7C233,#D89A00);color:#131310;}
  .ha-badge.away{background:#3a3a2e;color:#F3EFE3;border:1px solid #4a4a3d;}
  .ha-badge.large{font-size:15px;padding:6px 14px;}
  .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:#2a2a22;border-radius:4px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 2l2.5 6.5H21l-5.2 4 2 6.5-5.8-4-5.8 4 2-6.5L3 8.5h6.5z" fill="#F4B400"/></svg>
    </div>
    <div style="flex:1;">
      <div class="brand">VEGALTA <span>仙台</span></div>
      <div class="sub">PLAYER &amp; FORMATION TRACKER</div>
    </div>
    <button class="btn-ghost" data-action="export-data" title="現在のデータをファイルに保存">⬇ バックアップ</button>
    <button class="btn-ghost" data-action="import-data" title="バックアップファイルから復元">⬆ 復元</button>
    <button class="btn-ghost" data-action="open-sync-modal" title="PC・スマホ間の自動同期を設定">☁ 同期<span id="syncIndicator"></span></button>
    <input type="file" id="importFile" accept="application/json" style="display:none;">
    <input type="file" id="emblemFile" accept="image/*" style="display:none;">
  </header>

  <nav id="nav"></nav>
  <div id="app"></div>
</div>

<script src="app.js"></script>
</body>
</html>
